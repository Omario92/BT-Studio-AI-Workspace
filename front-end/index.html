// ─────────────────────────────────────────────────────────────
// UPSCALER WORKBENCH
// ─────────────────────────────────────────────────────────────
function UpscalerWorkbench({ tool, onBack }) {
  const [factor, setFactor] = React.useState("4x");
  const [face, setFace] = React.useState(true);
  const [detail, setDetail] = React.useState(72);
  const [denoise, setDenoise] = React.useState(45);

  // ─── Source asset from selection bar (Projects → Use with AI) ───
  const [sourceAsset, setSourceAsset] = React.useState(() => {
    try {
      const stored = localStorage.getItem("bt_selected_assets_for_ai");
      if (!stored) return null;
      const parsed = JSON.parse(stored);
      const first = parsed?.assets?.[0];
      return first ? { ...first, projectId: parsed.projectId } : null;
    } catch (_e) { return null; }
  });

  const clearSource = () => {
    localStorage.removeItem("bt_selected_assets_for_ai");
    setSourceAsset(null);
  };

  // ─── Job state machine ──────────────────────────
  // status: 'idle' | 'submitting' | 'queued' | 'running' | 'completed' | 'failed'
  const [jobStatus, setJobStatus] = React.useState("idle");
  const [jobId, setJobId] = React.useState(null);
  const [jobProgress, setJobProgress] = React.useState(0);
  const [jobError, setJobError] = React.useState(null);
  const [resultUrl, setResultUrl] = React.useState(null);
  const [resultAssetId, setResultAssetId] = React.useState(null);

  // ─── Poll job until terminal status ─────────────
  React.useEffect(() => {
    if (!jobId || jobStatus === "completed" || jobStatus === "failed") return;
    let cancelled = false;
    const tick = async () => {
      try {
        const job = await window.jobsApi.getJob(jobId);
        if (cancelled) return;
        setJobProgress(job.progress ?? 0);
        if (job.status === "RUNNING")   setJobStatus("running");
        if (job.status === "QUEUED")    setJobStatus("queued");
        if (job.status === "COMPLETED") {
          setJobStatus("completed");
          const result = job.result || {};
          if (result.fileUrl)   setResultUrl(result.fileUrl);
          if (result.assetId)   setResultAssetId(result.assetId);
        }
        if (job.status === "FAILED") {
          setJobStatus("failed");
          setJobError(job.errorMsg || "Job failed");
        }
      } catch (err) {
        if (cancelled) return;
        setJobStatus("failed");
        setJobError(err.message || "Failed to poll job status");
      }
    };
    tick(); // immediate first poll
    const id = setInterval(tick, 2000);
    return () => { cancelled = true; clearInterval(id); };
  }, [jobId, jobStatus]);

  const busy = jobStatus === "submitting" || jobStatus === "queued" || jobStatus === "running";

  const handleRunUpscale = async () => {
    if (!sourceAsset || busy) return;
    setJobStatus("submitting");
    setJobError(null);
    setResultUrl(null);
    setResultAssetId(null);
    setJobProgress(0);
    try {
      const scale = factor === "2x" ? 2 : factor === "4x" ? 4 : 8;
      const res = await window.assetsApi.useWithAI([sourceAsset.id], {
        projectId: sourceAsset.projectId,
        toolId: "upscaler",          // backend resolves slug → id
        jobType: "IMAGE_UPSCALE",
        mode: "single",
        params: { scale, faceEnhance: !!face },
      });
      const newJobId = res?.job?.id;
      if (!newJobId) throw new Error("No job id returned from /use-with-ai");
      setJobId(newJobId);
      setJobStatus("queued");
    } catch (err) {
      setJobStatus("failed");
      setJobError(err.message || "Failed to start upscale job");
    }
  };

  return (
    <>
      <WorkbenchHead tool={tool} onBack={onBack} />

      <div className="upscaler" style={{flex: 1, minHeight: 0}}>
        {/* SIDE PANEL */}
        <aside className="up-side">
          <div className="up-side__head">Upscale Settings</div>
          <div className="up-side__body">

            <div className="field">
              <label className="field__label" style={{color:"var(--ink-on-dark)"}}>Source image</label>
              <div style={{
                border: "1px solid var(--line-on-dark-2)",
                background: "var(--bg-input-dark)",
                borderRadius: 10, padding: 8,
                display: "flex", alignItems: "center", gap: 10
              }}>
                <div style={{width: 56, height: 56, borderRadius: 6, overflow: "hidden", background: 'var(--bg-canvas-2)'}}>
                  {sourceAsset?.fileUrl ? (
                    <img src={sourceAsset.fileUrl} alt={sourceAsset.name}
                         style={{width: '100%', height: '100%', objectFit: 'cover'}} />
                  ) : (
                    <Placeholder tone="violet" label="" style={{height:"100%", borderRadius: 0}} />
                  )}
                </div>
                <div style={{flex: 1, minWidth: 0}}>
                  <div style={{fontFamily:"var(--f-mono)", fontSize: 11, color:"#fff", textOverflow:'ellipsis', overflow:'hidden', whiteSpace:'nowrap'}} title={sourceAsset?.name}>
                    {sourceAsset?.name || "No source selected"}
                  </div>
                  <div style={{fontFamily:"var(--f-mono)", fontSize: 10, color:"var(--ink-on-dark-3)", marginTop: 2}}>
                    {sourceAsset
                      ? (sourceAsset.mimeType || 'image/png')
                      : "Pick from Projects → Use with AI"}
                  </div>
                </div>
                {sourceAsset && (
                  <button className="icon-btn" onClick={clearSource} title="Clear source">{I.x}</button>
                )}
              </div>
            </div>

            <div className="field">
              <label className="field__label" style={{color:"var(--ink-on-dark)"}}>Upscale factor</label>
              <div className="factor-grid">
                {[
                  { k: "2x", sub: "2048" },
                  { k: "4x", sub: "4096" },
                  { k: "8x", sub: "8192" },
                ].map(f => (
                  <button key={f.k}
                    className={`factor-btn ${factor === f.k ? "active" : ""}`}
                    onClick={() => setFactor(f.k)}>
                    <span className="big">{f.k}</span>
                    <span className={`sub ${factor === f.k ? "sub-active" : ""}`}>→ {f.sub}px</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="slider-row">
              <div className="slider-row__head">
                Detail enhancement
                <span className="v">{detail}%</span>
              </div>
              <div className="slider-track" onClick={e => {
                const r = e.currentTarget.getBoundingClientRect();
                setDetail(Math.round(((e.clientX - r.left) / r.width) * 100));
              }}>
                <div className="fill" style={{width: detail + "%"}}/>
                <div className="thumb" style={{left: detail + "%"}}/>
              </div>
            </div>

            <div className="slider-row">
              <div className="slider-row__head">
                Denoise
                <span className="v">{denoise}%</span>
              </div>
              <div className="slider-track" onClick={e => {
                const r = e.currentTarget.getBoundingClientRect();
                setDenoise(Math.round(((e.clientX - r.left) / r.width) * 100));
              }}>
                <div className="fill" style={{width: denoise + "%"}}/>
                <div className="thumb" style={{left: denoise + "%"}}/>
              </div>
            </div>

            <div className="aiw__consist" style={{marginTop: 6}}>
              <span style={{color:"var(--ink-on-dark)"}}>{I.face}</span>
              <div className="lbl">
                Face enhancement
                <em>Identity-aware skin & feature refinement</em>
              </div>
              <button className={`toggle ${face ? "toggle--on" : ""}`} onClick={() => setFace(!face)} />
            </div>

            <div style={{
              marginTop: 16, padding: "10px 12px",
              border: "1px solid var(--line-on-dark-2)",
              borderRadius: 8, background: "var(--bg-input-dark)"
            }}>
              <div style={{fontFamily:"var(--f-mono)", fontSize: 10, letterSpacing:"0.10em", color:"var(--ink-on-dark-3)", marginBottom: 6}}>OUTPUT ESTIMATE</div>
              <div style={{display: "flex", justifyContent:"space-between", fontFamily:"var(--f-mono)", fontSize: 12, color:"var(--ink-on-dark)"}}>
                <span>Resolution</span><span>{factor === "2x" ? "2048" : factor === "4x" ? "4096" : "8192"}px</span>
              </div>
              <div style={{display: "flex", justifyContent:"space-between", fontFamily:"var(--f-mono)", fontSize: 12, color:"var(--ink-on-dark)", marginTop: 4}}>
                <span>Render time</span><span>~{factor === "2x" ? 6 : factor === "4x" ? 14 : 38}s</span>
              </div>
              <div style={{display: "flex", justifyContent:"space-between", fontFamily:"var(--f-mono)", fontSize: 12, color:"var(--ink-on-dark)", marginTop: 4}}>
                <span>GPU cost</span><span>{factor === "2x" ? "1" : factor === "4x" ? "3" : "8"} credits</span>
              </div>
            </div>
          </div>
          <div className="up-side__foot">
            <button
              className="btn btn--secondary"
              style={{flex:1, justifyContent:"center", background:"var(--bg-input-dark)", color:"var(--ink-on-dark)", borderColor:"var(--line-on-dark-2)"}}
              disabled={busy}
              onClick={() => { setFactor("4x"); setFace(true); setDetail(72); setDenoise(45); }}>
              Reset
            </button>
            <button
              className="btn btn--primary"
              style={{flex:2, justifyContent:"center"}}
              disabled={busy || !sourceAsset}
              onClick={handleRunUpscale}
              title={!sourceAsset ? "Pick an asset from Projects → Use with AI first" : ""}>
              {I.spark}
              <span>
                {jobStatus === "submitting" ? "Starting…"
                  : jobStatus === "queued"  ? "Queued…"
                  : jobStatus === "running" ? `Upscaling… ${jobProgress}%`
                  : "Upscale"}
              </span>
            </button>
          </div>
        </aside>

        {/* CANVAS */}
        <section className="up-canvas">
          <header className="up-canvas__head">
            <span className="lbl">Before / After</span>
            {jobStatus === "completed" && (
              <span className="chip chip--approved"><span className="dot-status dot-status--approved"/>UPSCALE COMPLETE</span>
            )}
            {(jobStatus === "queued" || jobStatus === "running") && (
              <span className="chip chip--generating"><span className="dot-status dot-status--generating"/>{jobStatus === "queued" ? "QUEUED" : `RUNNING ${jobProgress}%`}</span>
            )}
            {jobStatus === "failed" && (
              <span className="chip chip--failed"><span className="dot-status dot-status--failed"/>FAILED</span>
            )}
            <span style={{flex: 1}} />
            <div className="segmented">
              <button className="active">Compare</button>
              <button>Before</button>
              <button>After</button>
            </div>
          </header>
          <div className="up-canvas__stage">
            <div className="compare">
              <div className="before">
                {sourceAsset?.fileUrl ? (
                  <img src={sourceAsset.fileUrl} alt="before" style={{width:'100%', height:'100%', objectFit:'cover'}} />
                ) : (
                  <Placeholder tone="violet" label="" />
                )}
                <span className="compare__tag" style={{left: 12}}>BEFORE</span>
              </div>
              <div className="after">
                {resultUrl ? (
                  <img src={resultUrl} alt="after" style={{width:'100%', height:'100%', objectFit:'cover'}} />
                ) : (
                  <Placeholder tone="violet" label={busy ? "GENERATING…" : "AWAITING UPSCALE"} />
                )}
                <span className="compare__tag" style={{right: 12}}>AFTER · {factor}</span>
              </div>
              <div className="compare__handle"/>
            </div>
          </div>
          <div className="up-canvas__foot">
            <div className="up-stats">
              <span>Scale: <b>{factor}</b></span>
              <span>Face enhance: <b>{face ? "on" : "off"}</b></span>
              {jobError && (
                <span style={{color: "var(--st-failed)"}}>⚠ {jobError}</span>
              )}
            </div>
            <span className="spacer" />
            {resultUrl && (
              <a className="btn btn--secondary" href={resultUrl} target="_blank" rel="noreferrer">
                {I.download}<span>Open output</span>
              </a>
            )}
            <button
              className="btn btn--primary"
              disabled={!resultAssetId}
              onClick={() => {
                if (!resultAssetId) return;
                localStorage.setItem("bt_screen", "projects");
                localStorage.setItem("bt_focus_asset", resultAssetId);
                window.location.reload();
              }}>
              {I.folder}<span>Open in project</span>
            </button>
          </div>
        </section>
      </div>
    </>
  );
}

          ...t,
          icon: (typeof I !== "undefined" && t.iconKey && I[t.iconKey]) ? I[t.iconKey] : (t.icon ?? null),

      setOffline(true);
    }).finally(() => {
      setLoadingTools(false);

  React.useEffect(() => {
    if (typeof jobsApi === "undefined") return;

        const orderB = b.sortOrder !== undefined ? b.sortOrder : (typeof TOOLS !== "undefined" ? TOOLS.findIndex(x => x.id === b.id) : 0);
        return orderA - orderB;
      });
    } else if (sortBy === "alpha") {
      list.sort((a, b) => (a.name || "").localeCompare(b.name || ""));

    return list;

// AI WORKSPACE — orchestrator (Home ↔ Workbench)

function AIWorkspace({ onSwitchScreen, onActiveToolChange }) {
  const [toolId, setToolId] = React.useState(() => {
    try { return localStorage.getItem("bt_tool") || null; } catch (e) { return null; }
  });
  const [pinned, setPinned] = React.useState(() => {
    try {
      const raw = localStorage.getItem("bt_pinned");
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return ["image-gen", "upscaler", "editor", "video-gen"];
  });

  React.useEffect(() => {
    try { localStorage.setItem("bt_tool", toolId || ""); } catch (e) {}
    if (onActiveToolChange) onActiveToolChange(toolId || null);
  }, [toolId]);
  React.useEffect(() => {
    try { localStorage.setItem("bt_pinned", JSON.stringify(pinned)); } catch (e) {}
  }, [pinned]);

  const togglePin = (id) => {
    setPinned(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  };

  // Validate stale tool from localStorage
  React.useEffect(() => {
    if (toolId && !TOOLS.find(t => t.id === toolId)) setToolId(null);
  }, [toolId]);

  if (!toolId) {
    return <WorkspaceHome pinned={pinned} onPin={togglePin} onOpen={setToolId} onSwitchScreen={onSwitchScreen} />;
  }

  const tool = TOOLS.find(t => t.id === toolId);
  if (!tool) {
    return <WorkspaceHome pinned={pinned} onPin={togglePin} onOpen={setToolId} onSwitchScreen={onSwitchScreen} />;
  }

  // Pick workbench by tool id
  let Workbench = ComingSoonWorkbench;
  if (toolId === "image-gen") Workbench = ImageGenWorkbench;
  else if (toolId === "upscaler") Workbench = UpscalerWorkbench;
  else if (toolId === "editor")   Workbench = EditorWorkbench;

  return <Workbench tool={tool} onBack={() => setToolId(null)} />;
}

window.AIWorkspace = AIWorkspace;
window.ImageGenWorkbench = ImageGenWorkbench;

<script type="text/babel">
// Build 24 frames with grouped statuses across two rows
const FRAMES = (() => {
  const groups = [
    { count: 2, status: "draft" },
    { count: 4, status: "wip"   },
    { count: 4, status: "approved" },
    { count: 2, status: "draft" },
    { count: 2, status: "draft" },
    { count: 3, status: "wip"   },
    { count: 3, status: "approved" },
    { count: 2, status: "wip"   },
    { count: 2, status: "draft" },
  ];
  const tones = ["mono","neutral","mono","mono","amber","green","mono","mono","neutral","neutral","amber","mono","mono","green","mono","neutral","amber","amber","amber","mono","neutral","neutral","mono","mono"];
  let arr = [], n = 1;
  groups.forEach(g => {
    const start = n;
    for (let i = 0; i < g.count; i++, n++) arr.push({ n, status: g.status, tone: tones[(n-1) % tones.length], groupStart: i === 0, groupEnd: i === g.count - 1, groupSize: g.count });
    arr[arr.length-1].groupRange = `${start}–${n-1}`;
  });
  return arr;
})();

function groupConsecutive(frames) {
  // Group adjacent same-status frames into chunks
  const out = []; let cur = null;
  frames.forEach((f, i) => {
    if (!cur || cur.status !== f.status) {
      cur = { status: f.status, items: [] };
      out.push(cur);
    }
    cur.items.push(f);
  });
  return out;
}

            <dt>Date</dt><dd>Oct 26, 2024 · 14:42</dd>
            <dt>Lens</dt><dd>35mm · f/2.8</dd>
            <dt>Status</dt><dd><span className={`chip chip--${sel.status === "wip" ? "wip" : sel.status}`}>{statusLabels[sel.status]}</span></dd>
            <dt>Version</dt><dd><span className="chip chip--version">v3</span> · 4 prior</dd>
            <dt>Reviewers</dt><dd>
              <div className="avatar-stack" style={{display:"inline-flex"}}>
                <div className="avatar avatar--a sm">AC</div>
                <div className="avatar avatar--b sm">DK</div>
                <div className="avatar avatar--c sm">SM</div>
              </div>
            </dd>
          </dl>
        </div>
        <div style={{display:"flex", flexDirection:"column", gap:14}}>
          <button className="btn btn--primary btn--lg" style={{width:"100%", justifyContent:"center"}}>
            {I.spark}<span>Open Frame in AI Workspace</span>
          </button>
          <button className="btn btn--secondary" style={{width:"100%", justifyContent:"center"}}>
            {I.comment}<span>Open comments (8)</span>
          </button>
          <button className="btn btn--secondary" style={{width:"100%", justifyContent:"center"}}>
            {I.refresh}<span>View version history</span>
          </button>
          <div style={{
            padding:"12px 14px",
            border:"1px solid var(--line)",
            borderRadius:10,
            background:"var(--bg-card)",
            display:"flex", flexDirection:"column", gap:8
          }}>
            <div className="detail-h">Pre-vis notes</div>
            <p style={{margin:0, fontSize:12, color:"var(--ink-3)", lineHeight:1.5}}>
              Match camera-rule preset "Wide Establishing 03". Hold on this beat 2.4s before cut.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

window.StoryboardView = StoryboardView;

</script>
<script type="text/babel">
function App() {
  // Resolve components from window at render time (Babel processes 15 blocks concurrently;
  // top-level destructuring would capture undefined before other blocks finish)
  const Login           = window.Login;
  const Dashboard       = window.Dashboard;
  const ProjectMgmt     = window.ProjectMgmt;
  const AIWorkspace     = window.AIWorkspace;
  const TemplateLibrary = window.TemplateLibrary;
  const ActivityLog     = window.ActivityLog;
  const BatchMode       = window.BatchMode;
  const StoryboardView  = window.StoryboardView;
  const Sidebar         = window.Sidebar;
  const Topbar          = window.Topbar;

  const [screen, setScreen] = React.useState(() => {
    const stored = (() => { try { return localStorage.getItem("bt_screen"); } catch(e) { return null; } })();
    return stored || "login";
  });
  const [activeToolId, setActiveToolId] = React.useState(() => {
    try { return localStorage.getItem("bt_tool") || null; } catch (e) { return null; }
  });
  const [theme, setTheme] = React.useState(() => {
    try { return localStorage.getItem("bt_theme") || "light"; } catch (e) { return "light"; }
  });
  const [currentUser, setCurrentUser] = React.useState(null);
  const [loadingProfile, setLoadingProfile] = React.useState(true);

  React.useEffect(() => {
    if (typeof apiClient === "undefined") {
      setLoadingProfile(false);
      return;
    }
    const token = apiClient.auth.getToken();
    if (!token) {
      setScreen("login");
      setLoadingProfile(false);
      return;
    }
    apiClient.auth.getMe()
      .then(user => {
        setCurrentUser(user);
        if (screen === "login") setScreen("dashboard");
      })
      .catch(() => {
        apiClient.auth.logout();
        setScreen("login");
      })
      .finally(() => {
        setLoadingProfile(false);
      });
  }, []);

  React.useEffect(() => {
    try { localStorage.setItem("bt_theme", theme); } catch (e) {}
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === "dark" ? "light" : "dark");

  React.useEffect(() => {
    try { localStorage.setItem("bt_screen", screen); } catch (e) {}
  }, [screen]);

  const onChange = (id) => {
    if (id === "login") {
      if (typeof apiClient !== "undefined") {
        apiClient.auth.logout();
      }
      setCurrentUser(null);
    }
    setScreen(id);
  };

  const handleLoginSuccess = (user) => {
    setCurrentUser(user);
    setScreen("dashboard");
  };

  if (loadingProfile) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: "var(--bg-canvas)", color: "var(--ink)" }}>
        <div style={{ fontSize: 18, fontWeight: 600, display: "flex", alignItems: "center", gap: 10 }}>
          <span className="dot-status dot-status--generating" style={{ width: 12, height: 12, display: "inline-block" }} />
          Loading BT Studio Workspace...
        </div>
      </div>
    );
  }

  // Login is its own full-bleed view
  if (screen === "login" || !currentUser) {
    return <Login onLogin={handleLoginSuccess} />;
  }

  const crumbsMap = {
    dashboard:  ["BT Studio", "Dashboard"],
    projects:   ["BT Studio", "Projects", "Huda Commercial"],
    workspace:  (() => {
      const base = ["BT Studio", "AI Workspace"];
      if (activeToolId && window.TOOLS) {
        const t = window.TOOLS.find(x => x.id === activeToolId);
        if (t) return [...base, t.name];
      }
      return base;
    })(),
    batch:      ["BT Studio", "Batch Mode", "Job EX-2487"],
    timeline:   ["BT Studio", "Storyboard", "Halida · Act 02"],
    templates:  ["BT Studio", "Template Library"],
    activity:   ["BT Studio", "Activity Log"],
    assets:     ["BT Studio", "Asset DB"],
    team:       ["BT Studio", "Team"],
    settings:   ["BT Studio", "Admin Settings"],
  };

  const titles = {
    dashboard: "Dashboard",
    projects: "Project Management",
    workspace: "AI Workspace",
    batch: "Batch Mode",
    timeline: "Storyboard",
    templates: "Template Library",
    activity: "Activity Log",
  };

  const content = (() => {
    switch (screen) {
      case "dashboard": return <Dashboard />;
      case "projects":  return <ProjectMgmt />;
      case "workspace": return <AIWorkspace onSwitchScreen={setScreen} onActiveToolChange={setActiveToolId} />;
      case "batch":     return <BatchMode />;
      case "timeline":  return <StoryboardView />;
      case "templates": return <TemplateLibrary />;
      case "activity":  return <ActivityLog />;
      default:
        return (
          <div className="page">
            <div className="crumbs">BT STUDIO / <strong>{(titles[screen] || screen).toUpperCase()}</strong></div>
            <h1 className="page-title" style={{marginTop:4}}>{titles[screen] || screen}</h1>
            <p className="page-sub">This area is part of the prototype but not yet wired up.</p>
            <div className="card card--pad" style={{padding: 32, textAlign: "center", color:"var(--ink-3)"}}>
              <div style={{fontFamily:"var(--f-mono)", letterSpacing:"0.10em", fontSize:11, color:"var(--ink-4)", marginBottom:10}}>PLACEHOLDER</div>
              <div>Pick another module from the sidebar to continue exploring.</div>
            </div>
          </div>
        );
    }
  })();

  // For canvas-heavy screens (workspace / batch / timeline / activity / projects)
  // we want the topbar visible but content fills the rest tightly.
  const wantsTight = ["workspace","batch","timeline","activity","projects"].includes(screen);

  return (
    <div className="app">
      <Sidebar active={screen} onChange={onChange} />
      <main className="workspace">
        <Topbar crumbs={crumbsMap[screen] || []} theme={theme} onToggleTheme={toggleTheme} />
        {wantsTight
          ? <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column"}}>{content}</div>
          : content}
      </main>
    </div>
  );
}

// Babel Standalone compiles all script blocks concurrently; poll until every
// component window global is set before mounting React.
(function waitAndRender() {
  const needed = ['Dashboard','Sidebar','Topbar','Login','ProjectMgmt',
                  'AIWorkspace','TemplateLibrary','ActivityLog','BatchMode','StoryboardView'];
  if (needed.every(k => window[k])) {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  } else {
    setTimeout(waitAndRender, 16);
  }
})();

</script>
</body>
</html>
